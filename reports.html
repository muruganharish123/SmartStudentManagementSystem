<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>🎓 SMS</h2>

        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/students">👨‍🎓 Students</a>
        <a href="/reports">📊 Reports</a>
        <a href="/settings">⚙ Settings</a>
        <a href="/">🚪 Logout</a>

    </div>

    <div class="main">

        <h1>Student Reports</h1>
        <p class="subtitle">Overall Student Statistics</p>

        <div class="cards">

            <div class="card">
                <h3>Total Students</h3>
                <p th:text="${totalStudents}"></p>
            </div>

            <div class="card">
                <h3>Database</h3>
                <p>MySQL</p>
            </div>

            <div class="card">
                <h3>Backend</h3>
                <p>Spring Boot</p>
            </div>

            <div class="card">
                <h3>Status</h3>
                <p>🟢 Running</p>
            </div>

        </div>

        <div class="info-box">

            <h2>All Student Records</h2>

            <table class="student-table">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>CGPA</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="student : ${students}">

                    <td th:text="${student.id}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.department}"></td>
                    <td th:text="${student.cgpa}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
