<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add / Edit Student</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h2>🎓 SMS</h2>
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/students">👨‍🎓 Students</a>
        <a href="/reports">📊 Reports</a>
        <a href="/settings">⚙ Settings</a>
        <a href="/">🚪 Logout</a>
    </div>

    <div class="main">
        <h1>Add / Edit Student</h1>

        <form th:action="@{/students/save}" th:object="${student}" method="post" class="student-form">

            <input type="hidden" th:field="*{id}">

            <input type="text" th:field="*{name}" placeholder="Student Name" required>

            <input type="text" th:field="*{department}" placeholder="Department" required>

            <input type="number" step="0.01" th:field="*{cgpa}" placeholder="CGPA" required>

            <button type="submit">Save Student</button>
        </form>
    </div>
</div>

</body>
</html>
