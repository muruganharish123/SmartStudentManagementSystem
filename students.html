<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h2>🎓 SMS</h2>
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/students">👨‍🎓 Students</a>
        <a href="/reports">📊 Reports</a>
        <a href="/">🚪 Logout</a>
    </div>

    <div class="main">
        <h1>Student Management</h1>

        <a href="/students/add" class="add-btn">+ Add Student</a>

        <table class="student-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>CGPA</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.department}"></td>
                <td th:text="${student.cgpa}"></td>
                <td>
                    <a th:href="@{'/students/edit/' + ${student.id}}" class="edit-btn">Edit</a>
                    <a th:href="@{'/students/delete/' + ${student.id}}" class="delete-btn">Delete</a>
                </td>
            </tr>

            <tr th:if="${students.size() == 0}">
                <td colspan="5">No students found. Add your first student.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
