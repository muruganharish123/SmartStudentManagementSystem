<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>Create Account</h1>

        <p>Register new admin account</p>

        <form action="/signup/save" method="post">

            <input
                    type="text"
                    name="fullName"
                    placeholder="Full Name"
                    required>

            <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

            <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

            <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

            <button class="login-btn" type="submit">
                Create Account
            </button>

        </form>

        <a href="/" class="signup-link">
            Already have an account? Login
        </a>

    </div>

</div>

</body>
</html>
